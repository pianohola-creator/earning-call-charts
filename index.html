<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐂</text></svg>">
<title>실적 캘린더 | 황소자산운용</title>
<style>
:root {
  color-scheme: light dark;
  --paper: #ffffff;
  --soft: #f6f5f1;
  --soft-2: #efede7;
  --ink: #1d1a16;
  --muted: #6d675c;
  --line: #e2ddd2;
  --accent: #b8442c;
  --accent-ink: #96351f;
  --accent-soft: #f9ebe6;
  --tbd-bg: #f1efe9;
  --down: #2563eb;
  --shadow: 0 8px 28px rgba(29, 26, 22, .07);
}
@media (prefers-color-scheme: dark) {
  :root {
    --paper: #232019;
    --soft: #191713;
    --soft-2: #211e18;
    --ink: #ece7dd;
    --muted: #a29b8c;
    --line: #3a352b;
    --accent: #e0684b;
    --accent-ink: #ec8a70;
    --accent-soft: #38271f;
    --tbd-bg: #1e1b15;
    --down: #6d9bf5;
    --shadow: 0 8px 28px rgba(0, 0, 0, .35);
  }
}
* { box-sizing: border-box; }
html { background: var(--soft); scroll-behavior: smooth; }
body {
  margin: 0;
  color: var(--ink);
  background: var(--soft);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Malgun Gothic", sans-serif;
  font-size: 14px;
  line-height: 1.5;
}
button, input { font: inherit; color: inherit; }
a { color: var(--ink); text-underline-offset: 3px; }
.shell { width: min(1360px, calc(100% - 48px)); margin: 0 auto; padding: 18px 0 44px; }

/* ---------- header ---------- */
.masthead { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 12px; flex-wrap: wrap; }
.brand-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; line-height: 1; }
.brand-mark { width: 34px; height: 5px; background: var(--accent); border-radius: 999px; }
.brand-name { font-size: 15px; font-weight: 850; letter-spacing: .01em; }
.brand-sub { padding-left: 10px; border-left: 1px solid var(--line); color: var(--muted); font-size: 12.5px; font-weight: 600; }
h1 { margin: 0; font-size: clamp(24px, 2.5vw, 32px); line-height: 1.12; letter-spacing: -.03em; display: flex; align-items: center; gap: 10px; }
.q-badge { font-size: 13px; font-weight: 800; letter-spacing: .02em; color: var(--accent-ink); background: var(--accent-soft); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); border-radius: 999px; padding: 3px 11px; transform: translateY(2px); }
.head-note { margin: 0 0 4px; color: var(--muted); text-align: right; font-size: 13px; }
.head-note strong { color: var(--ink); }

/* ---------- panel & toolbar ---------- */
.panel { background: var(--paper); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
.toolbar {
  position: sticky; top: 0; z-index: 30;
  display: grid; grid-template-columns: minmax(200px, 250px) minmax(0, 1fr) auto;
  gap: 10px; align-items: center; padding: 9px 10px;
  background: color-mix(in srgb, var(--paper) 93%, transparent);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(10px);
}
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 11px; top: 50%; width: 16px; height: 16px; color: var(--muted); transform: translateY(-50%); pointer-events: none; }
#search {
  width: 100%; padding: 7px 10px 7px 34px;
  background: var(--soft); border: 1px solid var(--line); border-radius: 9px; outline: none;
}
#search:focus { border-color: var(--accent); }
.chips { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: thin; padding: 2px; }
.chip {
  flex: 0 0 auto; display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px; background: var(--soft); border: 1px solid var(--line);
  border-radius: 999px; cursor: pointer; font-size: 12.5px; font-weight: 650; white-space: nowrap;
}
.chip small { color: var(--muted); font-weight: 700; }
.chip:hover { border-color: var(--accent); }
.chip.on { background: var(--ink); border-color: var(--ink); color: var(--paper); }
.chip.on small { color: color-mix(in srgb, var(--paper) 70%, transparent); }
.count-pill { color: var(--muted); font-size: 12.5px; font-weight: 700; white-space: nowrap; padding-right: 4px; }

.legend { display: flex; flex-wrap: wrap; gap: 6px 18px; align-items: center; padding: 9px 14px; border-bottom: 1px solid var(--line); color: var(--muted); font-size: 12.5px; background: var(--soft); }
.legend .sw { display: inline-block; width: 13px; height: 13px; border-radius: 4px; vertical-align: -2px; margin-right: 5px; }
.legend .sw.ok { background: var(--paper); border: 1px solid var(--line); box-shadow: inset 3px 0 0 var(--accent); }
.legend .sw.tbd { background: var(--tbd-bg); border: 1px dashed var(--line); }

/* ---------- calendar ---------- */
.dow-row { display: grid; grid-template-columns: repeat(5, 1fr); border-bottom: 1px solid var(--line); background: var(--soft); }
.dow-row div { padding: 6px 0; text-align: center; font-size: 12px; font-weight: 800; color: var(--muted); letter-spacing: .1em; }
.week { display: grid; grid-template-columns: repeat(5, 1fr); border-bottom: 1px solid var(--line); }
.week:last-child { border-bottom: 0; }
.day { min-height: 96px; padding: 8px 7px 12px; border-right: 1px solid var(--line); min-width: 0; }
.day:last-child { border-right: 0; }
.day-head { display: flex; align-items: baseline; gap: 6px; margin-bottom: 7px; }
.day-date { font-size: 13px; font-weight: 850; letter-spacing: -.01em; }
.day-dow { font-size: 11px; color: var(--muted); font-weight: 700; }
.day.today .day-date { color: var(--accent-ink); }
.day.today .day-head::after { content: "오늘"; font-size: 10px; font-weight: 800; color: var(--accent-ink); background: var(--accent-soft); border-radius: 999px; padding: 1px 7px; margin-left: auto; }
.day-empty { color: var(--line); font-weight: 700; padding: 2px 4px; }

.card {
  display: block; width: 100%; text-align: left; cursor: pointer;
  background: var(--paper); border: 1px solid var(--line); border-radius: 9px;
  padding: 5px 8px 6px; margin-bottom: 5px;
  box-shadow: inset 3px 0 0 var(--accent);
  transition: transform .06s ease, border-color .06s ease;
}
.card:hover { border-color: var(--accent); transform: translateY(-1px); }
.card.tbd { background: var(--tbd-bg); border-style: dashed; box-shadow: none; }
.card-name { display: block; font-weight: 750; font-size: 12.5px; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-meta { display: flex; align-items: center; gap: 5px; margin-top: 2px; font-size: 11.5px; color: var(--muted); min-width: 0; }
.card-meta .m { font-weight: 800; color: var(--muted); letter-spacing: .02em; }
.card-meta .v { font-weight: 750; color: var(--ink); white-space: nowrap; }
.card-meta .v.neg { color: var(--down); }
.badge { margin-left: auto; flex: 0 0 auto; font-size: 10.5px; font-weight: 750; border-radius: 999px; padding: 1px 7px; white-space: nowrap; }
.badge.time { color: var(--accent-ink); background: var(--accent-soft); }
.badge.src { color: var(--muted); background: var(--soft-2); }

.gt-block { margin-top: 9px; padding-top: 7px; border-top: 1px dashed var(--line); }
.gt-title { font-size: 10.5px; font-weight: 850; color: var(--muted); letter-spacing: .06em; margin-bottom: 5px; }
.gt-chip {
  display: inline-flex; align-items: baseline; gap: 5px; max-width: 100%;
  background: var(--soft); border: 1px solid var(--line); border-radius: 999px;
  padding: 2px 9px; margin: 0 3px 4px 0; font-size: 11.5px; font-weight: 700;
}
.gt-chip small { color: var(--muted); font-weight: 650; font-size: 10.5px; white-space: nowrap; }

/* ---------- modal ---------- */
.overlay { position: fixed; inset: 0; z-index: 90; display: none; align-items: flex-start; justify-content: center; padding: 7vh 16px 16px; background: rgba(15, 13, 10, .45); backdrop-filter: blur(3px); }
.overlay.show { display: flex; }
.sheet { width: min(460px, 100%); background: var(--paper); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }
.sheet-head { display: flex; align-items: flex-start; gap: 10px; padding: 15px 16px 11px; border-bottom: 1px solid var(--line); }
.sheet-title { font-size: 17px; font-weight: 850; letter-spacing: -.02em; line-height: 1.25; }
.sheet-sub { color: var(--muted); font-size: 12.5px; margin-top: 3px; }
.sheet-close { margin-left: auto; flex: 0 0 auto; border: 1px solid var(--line); background: var(--soft); border-radius: 8px; width: 28px; height: 28px; cursor: pointer; line-height: 1; }
.sheet-close:hover { border-color: var(--accent); }
.sheet-body { padding: 13px 16px 16px; }
.sched-line { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.tag { font-size: 11.5px; font-weight: 750; border-radius: 999px; padding: 2px 10px; background: var(--soft); border: 1px solid var(--line); color: var(--muted); }
.tag.hot { color: var(--accent-ink); background: var(--accent-soft); border-color: color-mix(in srgb, var(--accent) 30%, transparent); }
table.cons { width: 100%; border-collapse: collapse; font-size: 12.5px; }
table.cons th, table.cons td { padding: 6px 8px; text-align: right; border-bottom: 1px solid var(--line); white-space: nowrap; }
table.cons th { color: var(--muted); font-weight: 750; font-size: 11.5px; }
table.cons th:first-child, table.cons td:first-child { text-align: left; color: var(--muted); font-weight: 700; }
table.cons td { font-weight: 700; font-variant-numeric: tabular-nums; }
table.cons tr.hl td { color: var(--ink); font-weight: 850; }
table.cons td.neg { color: var(--down); }
.growth-row { display: flex; gap: 6px; margin-top: 11px; }
.sheet-foot { margin-top: 12px; font-size: 11.5px; color: var(--muted); display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }

footer.site { margin-top: 14px; color: var(--muted); font-size: 11.5px; line-height: 1.6; }

@media (max-width: 900px) {
  .shell { width: calc(100% - 24px); }
  .toolbar { grid-template-columns: 1fr; }
  .count-pill { display: none; }
  .dow-row { display: none; }
  .week { grid-template-columns: 1fr; }
  .day { border-right: 0; border-bottom: 1px solid var(--line); min-height: 0; }
  .day:last-child { border-bottom: 0; }
  .day:not(.has-items) { display: none; }
  .masthead { align-items: flex-start; flex-direction: column; gap: 4px; }
  .head-note { text-align: left; }
}
</style>
</head>

const $ = s => document.querySelector(s);
const DOW = ['일','월','화','수','목','금','토'];
const state = { sector: 'all', q: '' };

function fmtAmt(v) { // v: KRW 100mn (억)
  if (v == null || isNaN(v)) return '—';
  const neg = v < 0, a = Math.abs(v);
  let s;
  if (a >= 10000) {
    const t = a / 10000;
    s = (t >= 100 ? Math.round(t).toLocaleString()
       : t >= 10 ? String(+t.toFixed(1))
       : String(+t.toFixed(2))) + '조';
  } else if (a >= 100) {
    s = Math.round(a).toLocaleString() + '억';
  } else {
    s = String(+a.toFixed(1)) + '억';
  }
  return (neg ? '-' : '') + s;
}
function fmtMcap(krw) { return krw == null ? '—' : fmtAmt(krw / 1e8); }
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function mdLabel(dt) { return (dt.getMonth()+1) + '/' + dt.getDate(); }
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// headline estimate for a record → {val, srcTag}
function headline(r) {
  const m = r.metric;
  if (m === 'OP' || m === 'NI') {
    const a = m === 'OP' ? [r.op_1m, r.op_3m] : [r.ni_1m, r.ni_3m];
    if (a[0] != null) return { val: a[0], tag: '1M' };
    if (a[1] != null) return { val: a[1], tag: '3M' };
  }
  if (r.fallback_est != null) return { val: r.fallback_est, tag: r.fallback_src };
  return { val: null, tag: null };
}

function timeBadge(r) {
  if (!r.time) return null;
  return r.time + (r.time_expected ? ' (E)' : '') + (r.event ? ' ' + r.event : '');
}

function matches(r) {
  if (state.sector !== 'all' && r.sector_id !== state.sector) return false;
  if (state.q) {
    const q = state.q.toLowerCase();
    const hay = (r.name + ' ' + (r.code || '')).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

/* ---------- build header/meta ---------- */
function renderMeta() {
  const M = DATA.meta;
  $('#qBadge').textContent = M.quarter + ' 실적';
  $('#noteTop').innerHTML = `대상 <strong>${DATA.records.length}종목</strong> · 발표일 확정 <strong>${DATA.records.filter(r=>r.status==='confirmed').length}건</strong> · 기간 ${M.window_label}`;
  $('#noteBottom').innerHTML = `컨센서스 기준 <strong>${esc(M.consensus_updated)}</strong> · 빌드 ${esc(M.built_at)}`;
  $('#siteFoot').innerHTML =
    `컨센서스: Consensus_DB(1M·3M 평균, 3M 최고 — 증권사 추정치) · 일정: DART/IR 공시 및 추정일 기준으로 변동 가능 · ` +
    `본 페이지는 황소자산운용 내부 참고용이며 투자 권유 자료가 아님<br>` +
    `Layout inspired by <a href="https://naiveinvestment.github.io/care-earnings-calendar/" target="_blank" rel="noopener">care-earnings-calendar</a>`;
}

/* ---------- sector chips ---------- */
const SECTOR_ORDER = ['financial','insurance','securities','holding','semiconductor','electronics','sw-ai','game','media','auto','robot','battery','shipbuilding','machinery','defense','power','nuclear','utilities','construction','chemical','materials','bio','beauty','consumer','telecom','transport','other','global-tech'];
function renderChips() {
  const order = [];
  const counts = {};
  for (const r of DATA.records) {
    if (!(r.sector_id in counts)) { counts[r.sector_id] = 0; order.push([r.sector_id, r.sector]); }
    counts[r.sector_id]++;
  }
  order.sort((a, b) => {
    const ia = SECTOR_ORDER.indexOf(a[0]), ib = SECTOR_ORDER.indexOf(b[0]);
    return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
  });
  const host = $('#chips');
  host.innerHTML = '';
  const mk = (id, label, n) => {
    const b = document.createElement('button');
    b.className = 'chip' + (state.sector === id ? ' on' : '');
    b.innerHTML = `${esc(label)} <small>${n}</small>`;
    b.onclick = () => { state.sector = id; renderChips(); renderCal(); };
    host.appendChild(b);
  };
  mk('all', '전체', DATA.records.length);
  for (const [id, label] of order) mk(id, label, counts[id]);
}

/* ---------- calendar ---------- */
function renderCal() {
  const byDate = {};
  for (const r of DATA.records) (byDate[r.date] ??= []).push(r);
  for (const k in byDate) byDate[k].sort((a, b) => (b.mcap ?? -1) - (a.mcap ?? -1));

  const start = parseDate(DATA.meta.window.start);
  const end = parseDate(DATA.meta.window.end);
  const monday = new Date(start);
  monday.setDate(monday.getDate() - ((monday.getDay() + 6) % 7));
  const today = new Date(); today.setHours(0,0,0,0);

  let shown = 0;
  const cal = $('#cal');
  cal.innerHTML = '';
  for (let w = new Date(monday); w <= end; w.setDate(w.getDate() + 7)) {
    const week = document.createElement('div');
    week.className = 'week';
    for (let i = 0; i < 5; i++) {
      const dt = new Date(w); dt.setDate(dt.getDate() + i);
      const iso = dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
      const cell = document.createElement('div');
      cell.className = 'day' + (dt.getTime() === today.getTime() ? ' today' : '');
      const items = (byDate[iso] || []).filter(matches);
      const dom = items.filter(r => !r.global);
      const gt = items.filter(r => r.global)
        .sort((a, b) => (a.time || '99').localeCompare(b.time || '99'));
      let html = `<div class="day-head"><span class="day-date">${mdLabel(dt)}</span><span class="day-dow">${DOW[dt.getDay()]}</span></div>`;
      if (!items.length) {
        html += '<div class="day-empty">—</div>';
      } else {
        cell.classList.add('has-items');
        for (const r of dom) {
          const h = headline(r);
          const tb = timeBadge(r);
          const badge = tb ? `<span class="badge time">${esc(tb)}</span>`
                      : h.tag ? `<span class="badge src">${esc(h.tag)}</span>` : '';
          html += `<button class="card${r.status === 'confirmed' ? '' : ' tbd'}" data-code="${esc(r.code)}">` +
            `<span class="card-name">${esc(r.name)}</span>` +
            `<span class="card-meta"><span class="m">${r.metric || 'OP'}</span>` +
            `<span class="v${h.val < 0 ? ' neg' : ''}">${fmtAmt(h.val)}</span>${badge}</span></button>`;
          shown++;
        }
        if (gt.length) {
          html += `<div class="gt-block"><div class="gt-title">해외 · 글로벌 Tech</div>`;
          for (const r of gt) {
            html += `<span class="gt-chip">${esc(r.name)}<small>${r.time ? esc(r.time + (r.time_expected ? ' (E)' : '')) + ' KST' : '—'}</small></span>`;
            shown++;
          }
          html += '</div>';
        }
      }
      cell.innerHTML = html;
      week.appendChild(cell);
    }
    cal.appendChild(week);
  }
  $('#countPill').textContent = shown + ' / ' + DATA.records.length;
  cal.querySelectorAll('.card').forEach(b => b.onclick = () => openModal(b.dataset.code));
}

/* ---------- modal ---------- */
function row(label, v1, v2, v3, hl) {
  const td = v => `<td class="${typeof v === 'number' && v < 0 ? 'neg' : ''}">${typeof v === 'number' ? fmtAmt(v) : (v ?? '—')}</td>`;
  return `<tr${hl ? ' class="hl"' : ''}><td>${label}</td>${td(v1)}${td(v2)}${td(v3)}</tr>`;
}
function openModal(code) {
  const r = DATA.records.find(x => x.code === code);
  if (!r) return;
  $('#mTitle').textContent = r.name;
  $('#mSub').textContent = `${r.sector} · ${r.code} · 시총 ${fmtMcap(r.mcap)}`;
  const dt = parseDate(r.date);
  const tags = [`<span class="tag hot">${mdLabel(dt)} (${DOW[dt.getDay()]}) ${r.status === 'confirmed' ? '확정' : '미정'}</span>`];
  const tb = timeBadge(r);
  if (tb) tags.push(`<span class="tag">${esc(tb)}</span>`);
  if (r.dart_url) tags.push(`<a class="tag" href="${esc(r.dart_url)}" target="_blank" rel="noopener">DART 공시 ↗</a>`);
  const isNI = r.metric === 'NI';
  let body = `<div class="sched-line">${tags.join('')}</div>`;
  body += `<table class="cons">
    <tr><th>컨센서스</th><th>1M 평균</th><th>3M 평균</th><th>3M 최고</th></tr>` +
    row('매출액', r.rev_1m, r.rev_3m, null) +
    row('영업이익', r.op_1m, r.op_3m, r.op_hi, !isNI) +
    row('순이익(지배)', r.ni_1m, r.ni_3m, r.ni_hi, isNI) +
    row('참여 증권사', r.n_1m != null ? r.n_1m + '개사' : null, r.n_3m != null ? r.n_3m + '개사' : null, null) +
  `</table>`;
  const g = [];
  if (r.qoq) g.push(`<span class="tag">QoQ ${esc(r.qoq)}</span>`);
  if (r.yoy) g.push(`<span class="tag">YoY ${esc(r.yoy)}</span>`);
  if (g.length) body += `<div class="growth-row">${g.join('')}<span class="tag" style="border:0;background:none;padding-left:0">${r.metric || 'OP'} 기준</span></div>`;
  if (r.fallback_est != null && r.op_1m == null && r.op_3m == null)
    body += `<div class="growth-row"><span class="tag">컨센서스 부재 → ${esc(r.fallback_src)} 추정 ${fmtAmt(r.fallback_est)}</span></div>`;
  body += `<div class="sheet-foot"><span>${DATA.meta.quarter} 실적 · 단위 억원</span><span>컨센서스 기준 ${esc(DATA.meta.consensus_updated)}</span></div>`;
  $('#mBody').innerHTML = body;
  $('#overlay').classList.add('show');
}
$('#overlay').addEventListener('click', e => { if (e.target === e.currentTarget) $('#overlay').classList.remove('show'); });
$('#mClose').onclick = () => $('#overlay').classList.remove('show');
document.addEventListener('keydown', e => { if (e.key === 'Escape') $('#overlay').classList.remove('show'); });

let deb;
$('#search').addEventListener('input', e => {
  clearTimeout(deb);
  deb = setTimeout(() => { state.q = e.target.value.trim(); renderCal(); }, 120);
});

renderMeta();
renderChips();
renderCal();
</script>
</body>
